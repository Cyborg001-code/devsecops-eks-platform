apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  devsecops-dashboard.json: |
    {
      "title": "DevSecOps Platform",
      "uid": "devsecops-main",
      "timezone": "browser",
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='devsecops',container!=''}[5m])) by (pod)",
            "legendFormat": "{{pod}}",
            "datasource": {"type": "prometheus", "uid": "prometheus"}
          }]
        },
        {
          "id": 2,
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{namespace='devsecops',container!=''}) by (pod)",
            "legendFormat": "{{pod}}",
            "datasource": {"type": "prometheus", "uid": "prometheus"}
          }]
        },
        {
          "id": 3,
          "title": "Pod Restarts",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
          "targets": [{
            "expr": "sum(kube_pod_container_status_restarts_total{namespace='devsecops'})",
            "legendFormat": "Restarts",
            "datasource": {"type": "prometheus", "uid": "prometheus"}
          }]
        },
        {
          "id": 4,
          "title": "Running Pods",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 8},
          "targets": [{
            "expr": "count(kube_pod_status_phase{namespace='devsecops',phase='Running'})",
            "legendFormat": "Running",
            "datasource": {"type": "prometheus", "uid": "prometheus"}
          }]
        },
        {
          "id": 5,
          "title": "Node CPU Usage",
          "type": "gauge",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 8},
          "targets": [{
            "expr": "avg(rate(node_cpu_seconds_total{mode!='idle'}[5m])) * 100",
            "legendFormat": "CPU %",
            "datasource": {"type": "prometheus", "uid": "prometheus"}
          }]
        },
        {
          "id": 6,
          "title": "Node Memory Usage",
          "type": "gauge",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 8},
          "targets": [{
            "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
            "legendFormat": "Memory %",
            "datasource": {"type": "prometheus", "uid": "prometheus"}
          }]
        }
      ],
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"}
    }
