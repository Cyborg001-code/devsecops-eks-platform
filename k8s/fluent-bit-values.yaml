config:
  service: |
    [SERVICE]
        Daemon Off
        Flush 5
        Log_Level info
        Parsers_File parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020

  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/devsecops-app*.log
        multiline.parser docker, cri
        Tag kube.var.log.containers.devsecops-app
        Refresh_Interval 5
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name kubernetes
        Match kube.var.log.containers.*
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On

  outputs: |
    [OUTPUT]
        Name s3
        Match kube.var.log.containers.*
        bucket devsecops-logs-4a3de528
        region us-east-1
        store_dir /tmp/fluent-bit-s3
        s3_key_format /logs/%Y/%m/%d/%H/%M/%S
        total_file_size 1M
        upload_timeout 1m
        use_put_object On

tolerations:
  - operator: Exists

serviceAccount:
  create: true
  annotations: {}

resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi