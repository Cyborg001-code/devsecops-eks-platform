apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: devsecops
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: 723640651983.dkr.ecr.us-east-1.amazonaws.com/devsecops-ai-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_DEFAULT_REGION
            - name: S3_LOGS_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: devsecops-config
                  key: S3_LOGS_BUCKET
            - name: S3_MODELS_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: devsecops-config
                  key: S3_MODELS_BUCKET
            - name: S3_LOGS_PREFIX
              value: "logs/"
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: slack-secret
                  key: SLACK_WEBHOOK_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
